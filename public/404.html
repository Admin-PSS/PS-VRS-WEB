<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>VRS</title>
    <script>
      // Redirect SPA routes through query string so GitHub Pages serves index.html
      // segmentCount=1 because the app lives at /PS-VRS-WEB/
      var segmentCount = 1
      var l = window.location
      l.replace(
        l.protocol + '//' + l.host +
        l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      )
    </script>
  </head>
  <body></body>
</html>
